<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz & Aptitude – Puzzle Round</title>

<style>
body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  background:linear-gradient(135deg,#020617,#041b2d,#06283d);
  color:#e0fefe;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:85%;
  max-width:800px;
  background:rgba(10,20,30,0.95);
  padding:30px;
  border-radius:18px;
  box-shadow:0 0 25px rgba(0,255,200,0.3);
}

h1{
  text-align:center;
  color:#2fffdc;
  text-shadow:0 0 10px #00ffd5;
}

.timer{
  text-align:center;
  margin-bottom:15px;
  font-weight:bold;
  color:#00ffd5;
}

.question{
  margin-top:20px;
  font-size:18px;
}

.options{
  margin-top:15px;
}

.options label{
  display:block;
  padding:10px;
  margin-bottom:10px;
  background:#0b1e2d;
  border-radius:10px;
  cursor:pointer;
  border:1px solid rgba(0,255,200,0.2);
}

.options input{
  margin-right:10px;
}

button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:linear-gradient(135deg,#00ffd5,#00bfa6);
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  box-shadow:0 0 20px rgba(0,255,200,0.6);
}
</style>
</head>

<body>

<div class="container">
  <h1>Quiz & Aptitude – Puzzle Round</h1>
  <div class="timer">⏱ Time Left: <span id="time">15:00</span></div>

  <div class="question" id="question"></div>
  <div class="options" id="options"></div>

  <button onclick="nextQuestion()">Next</button>
</div>

<script>
const quiz = [
{
 q:"A clock shows 7:20. What is the angle between the hour and minute hands?",
 o:["40°","50°","60°","70°"],
 a:1
},
{
 q:"All DATA is INFORMATION. Some INFORMATION is KNOWLEDGE. Which is logically correct?",
 o:[
  "All data is knowledge",
  "Some knowledge may be data",
  "No data is knowledge",
  "All knowledge is information"
 ],
 a:1
},
{
 q:"Find the next number in the series: 2, 5, 14, 41, ?",
 o:["122","123","124","125"],
 a:1
},
{
 q:"If 6 machines produce 240 items in 4 hours, how many items will 10 machines produce in 6 hours?",
 o:["600","800","900","1000"],
 a:2
},
{
 q:"A man walks 15m south, turns right and walks 20m, turns right again and walks 15m. How far is he from the start?",
 o:["0 m","10 m","20 m","30 m"],
 a:0
},
{
 q:"If the word SYSTEM is coded as TZXUFN, how is NETWORK coded?",
 o:["OFUXPSL","OFUXQRL","OFVXQRL","OFUXPSM"],
 a:0
},
{
 q:"Which number does NOT fit the pattern? 16, 25, 36, 49, 63",
 o:["16","25","49","63"],
 a:3
},
{
 q:"Two pipes fill a tank in 12 and 18 minutes. How long together?",
 o:["6.8 min","7.2 min","7.5 min","8 min"],
 a:2
},
{
 q:"If A=1, Z=26, what is the value of the word 'LOGIC'?",
 o:["47","49","51","53"],
 a:1
},
{
 q:"Five friends sit in a row. A is left of B, C is right of B, D is between B and C. Who is in the middle?",
 o:["A","B","C","D"],
 a:3
}
];

let index=0;
let score=0;
let timeLeft=900;

function loadQ(){
 document.getElementById("question").innerText =
  `Q${index+1}. `+quiz[index].q;

 let ops="";
 quiz[index].o.forEach((opt,i)=>{
  ops+=`
   <label>
    <input type="radio" name="opt" value="${i}">
    ${opt}
   </label>`;
 });
 document.getElementById("options").innerHTML=ops;
}

function nextQuestion(){
 let selected=document.querySelector('input[name="opt"]:checked');
 if(selected && parseInt(selected.value)===quiz[index].a){
   score++;
 }
 index++;
 if(index<quiz.length){
   loadQ();
 }else{
   alert("Quiz Completed!");
 }
}

setInterval(()=>{
 let m=Math.floor(timeLeft/60);
 let s=timeLeft%60;
 document.getElementById("time").innerText=
  `${m}:${s<10?"0"+s:s}`;
 timeLeft--;
 if(timeLeft<0){
  alert("Time Up! ");
 }
},1000);

loadQ();
</script>

</body>
</html>
