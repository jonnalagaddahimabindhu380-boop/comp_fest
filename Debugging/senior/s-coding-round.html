<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coding Competition – Rounds</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0a0f14;
  font-family:'Orbitron',sans-serif;
  color:#00ffcc;
}
.container{
  width:420px;
  background:#101820;
  border-radius:18px;
  padding:40px;
  box-shadow:0 0 25px rgba(0,255,204,0.25);
  text-align:center;
}
h1{font-size:24px;margin-bottom:6px;}
h2{font-size:14px;color:#66ffe0;margin-bottom:28px;}

.round{
  background:#0d1620;
  border:1px solid #00ffcc;
  border-radius:12px;
  padding:18px;
  margin-bottom:18px;
  cursor:pointer;
  transition:0.3s;
}
.round:hover{
  box-shadow:0 0 15px #00ffcc;
  transform:scale(1.03);
}
.round h3{font-size:16px;margin-bottom:6px;}
.round p{font-size:13px;color:#88ffe8;}
</style>
</head>

<body>

<div class="container">
  <h1>Coding Competition</h1>
  <h2>Rounds</h2>

  <div class="round" onclick="openRound('JR1@AI','s-coding-mcq.html')">
    <h3>Round 1: MCQ</h3>
    <p>C programming fundamentals</p>
  </div>

  <div class="round" onclick="openRound('JR2@AI','s-coding-error-detection.html')">
    <h3>Round 2: Error Detection</h3>
    <p>Find & correct errors</p>
  </div>

  <div class="round" onclick="openRound('JR3@AI','s-coding-program-writing.html')">
    <h3>Round 3: Final Coding</h3>
    <p>Logic-based coding</p>
  </div>
</div>

<script>
function openRound(password, page){
  const entered = prompt("Enter Round Password:");
  if(entered === null) return;

  if(entered === password){
    window.location.href = page;
  }else{
    alert("❌ Wrong Password");
  }
}
</script>

</body>
</html>
