<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Results Panel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", sans-serif;
}

body{
    min-height:100vh;
    background:#020617;
    color:#e5e7eb;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#00ffd5;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#0f172a;
    border-radius:10px;
    overflow:hidden;
}

th,td{
    border:1px solid #1f2937;
    padding:10px;
    text-align:center;
    font-size:14px;
}

th{
    background:#020617;
    color:#00ffd5;
}

tr:nth-child(even){
    background:#020617;
}

button{
    margin:20px auto;
    display:block;
    padding:10px 20px;
    background:#00ffd5;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    color:#020617;
}

button:hover{
    opacity:0.85;
}

pre{
    text-align:left;
    max-height:120px;
    overflow:auto;
    background:#020617;
    padding:8px;
    border-radius:6px;
    font-size:12px;
}
</style>
</head>

<body>

<h1>📊 Competition Results – Admin Panel</h1>

<table id="resultsTable">
<thead>
<tr>
    <th>Name</th>
    <th>Roll No</th>
    <th>Year</th>
    <th>Round-1 (MCQ)</th>
    <th>Round-2 (Error Detection)</th>
    <th>Round-3 (Final Coding)</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button onclick="clearData()">Clear All Data</button>

<script>
/*
 IMPORTANT:
 All participant data must be stored in localStorage
 under key: "allParticipants"
*/

const tableBody = document.querySelector("#resultsTable tbody");

// Read stored data
let participants = JSON.parse(localStorage.getItem("allParticipants")) || [];

participants.forEach(p => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${p.name}</td>
      <td>${p.roll}</td>
      <td>${p.year === "1" ? "Junior" : "Senior"}</td>

      <td>
        Score: ${p.round1?.score ?? "—"} / 10
      </td>

      <td>
        ${p.round2?.answers 
          ? "<pre>" + p.round2.answers.join("\n\n") + "</pre>"
          : "Not Submitted"}
      </td>

      <td>
        ${p.round3?.answers 
          ? "<pre>" + p.round3.answers.join("\n\n") + "</pre>"
          : "Not Submitted"}
      </td>
    `;

    tableBody.appendChild(row);
});

// Clear all data (ADMIN ONLY)
function clearData(){
    if(confirm("Are you sure you want to clear ALL participant data?")){
        localStorage.removeItem("allParticipants");
        location.reload();
    }
}
</script>

</body>
</html>
