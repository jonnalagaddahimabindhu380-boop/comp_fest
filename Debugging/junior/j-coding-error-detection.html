<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Error Detection – Round 2</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", sans-serif;
}

body{
    min-height:100vh;
    background:
        linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
        url("https://images.unsplash.com/photo-1611078488698-9f92b0f25238?fit=crop&w=1470&q=80");
    background-size:cover;
    background-position:center;
    color:#e0fefe;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 0;
}

.header{
    width:90%;
    max-width:900px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.header h1{
    font-size:34px;
    color:#2fffdc;
}

.timer{
    font-size:18px;
    font-weight:bold;
    color:#ffd700;
}

.container{
    width:90%;
    max-width:900px;
    background: rgba(10,20,25,0.92);
    padding:25px;
    border-radius:16px;
    box-shadow:0 0 25px rgba(0,255,200,0.3);
}

h2,h3{
    text-align:center;
}

h3{
    font-weight:normal;
    color:#cfeeee;
    margin-bottom:10px;
}

.code-box{
    background:#111;
    padding:15px;
    border-radius:10px;
    white-space:pre-wrap;
    font-family:Consolas, monospace;
    margin-bottom:15px;
    border-left:4px solid #00ffd5;
}

textarea{
    width:100%;
    height:180px;
    background:#111;
    color:#e0fefe;
    border:none;
    border-radius:10px;
    padding:12px;
    font-family:Consolas, monospace;
    resize:none;
    border-left:4px solid #2fffdc;
}

.buttons{
    text-align:center;
    margin-top:20px;
}

button{
    background:linear-gradient(135deg,#00ffd5,#00bfa6);
    color:#002222;
    border:none;
    padding:12px 26px;
    margin:5px;
    border-radius:25px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
    <h1>Error Detection</h1>
    <div class="timer">⏱ <span id="time">20:00</span></div>
</div>

<div class="container">
    <h2 id="qno">Question 1</h2>
    <h3 id="progTitle"></h3>

    <div class="code-box" id="errorCode"></div>
    <textarea id="answerBox" placeholder="Rewrite the correct C program here..."></textarea>

    <div class="buttons">
        <button onclick="prevQ()">Previous</button>
        <button onclick="nextQ()">Next</button>
        <button onclick="submitRound()">Submit Round</button>
    </div>
</div>

<script>
let questions = [
    {title:"Program to print Hello World", code:`#include <stdio.h>\n\nint main()\n{\nprintf("Hello World")\nreturn 0;\n}`},
    {title:"Program to read and print a number", code:`#include <stdio.h>\n\nint main()\n{\nint a;\nscanf("%d", a);\nprintf("%d", a);\nreturn 0;\n}`},
    {title:"Program to add two numbers", code:`#include <stdio.h>\n\nint main()\n{\nint a,b\nscanf("%d %d", &a, &b);\nprintf("%d", a+b);\nreturn 0;\n}`},
    {title:"Program to check even or odd", code:`#include <stdio.h>\n\nint main()\n{\nint n;\nscanf("%d",&n);\nif(n % 2 = 0)\nprintf("Even");\nelse\nprintf("Odd");\nreturn 0;\n}`},
    {title:"Program to print numbers from 1 to 5", code:`#include <stdio.h>\n\nint main()\n{\nint i;\nfor(i=1;i<=5;i++)\nprintf(i);\nreturn 0;\n}`},
    {title:"Program to find largest of two numbers", code:`#include <stdio.h>\n\nint main()\n{\nint a,b;\nscanf("%d %d", &a &b);\nif(a>b)\nprintf("a is largest");\nelse\nprintf("b is largest");\nreturn 0;\n}`},
    {title:"Program to find factorial of a number", code:`#include <stdio.h>\n\nint main()\n{\nint n,i,fact=0;\nscanf("%d",&n);\nfor(i=1;i<=n;i++)\nfact=fact*i;\nprintf("%d",fact);\nreturn 0;\n}`},
    {title:"Program to print numbers using while loop", code:`#include <stdio.h>\n\nint main()\n{\nint i=1;\nwhile(i<=5)\n{\nprintf("%d",i);\n}\ni++;\nreturn 0;\n}`},
    {title:"Program to reverse a number", code:`#include <stdio.h>\n\nint main()\n{\nint n,rev;\nscanf("%d",&n);\nwhile(n>0)\n{\nrev=rev*10+n%10;\nn=n/10;\n}\nprintf("%d",rev);\nreturn 0;\n}`},
    {title:"Program to check positive, negative or zero", code:`#include <stdio.h>\n\nint main()\n{\nint n;\nscanf("%d",&n);\nif(n>0)\nprintf("Positive");\nif(n<0)\nprintf("Negative");\nelse\nprintf("Zero");\nreturn 0;\n}`}
];

let index=0;
let answers=new Array(questions.length).fill("");

function loadQ(){
 document.getElementById("qno").innerText="Question "+(index+1);
 document.getElementById("progTitle").innerText=questions[index].title;
 document.getElementById("errorCode").innerText=questions[index].code;
 document.getElementById("answerBox").value=answers[index];
}
function nextQ(){ answers[index]=answerBox.value; if(index<9){index++;loadQ();}}
function prevQ(){ answers[index]=answerBox.value; if(index>0){index--;loadQ();}}

let time=1200;
setInterval(()=>{
 let m=Math.floor(time/60),s=time%60;
 document.getElementById("time").innerText=`${m}:${s<10?"0":""}${s}`;
 time--;
 if(time<0) submitRound();
},1000);

function submitRound(){
 answers[index]=answerBox.value;
 let participant=JSON.parse(localStorage.getItem("participant"))||{};
 participant.round2="Submitted";
 localStorage.setItem("participant",JSON.stringify(participant));
 alert("Error Detection Round Submitted!");
 window.location.href="competition-home.html";
}

loadQ();
</script>

</body>
</html>
