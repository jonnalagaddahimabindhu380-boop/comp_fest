<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Junior MCQ Quiz</title>

<style>
*{
    box-sizing:border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", sans-serif;
    background:
      linear-gradient(135deg, rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
      url("https://images.unsplash.com/photo-1518770660439-4636190af475");
    background-size: cover;
    background-position: center;
    color: #e6fffa;
}

.header-bar {
    margin-top: 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 60px;
}

h1 {
    font-size: 30px;
    color: #7fffd4;
    text-shadow: 0 0 10px #00ffd5;
}

#timer {
    background: #0f172a;
    padding: 10px 18px;
    border-radius: 25px;
    font-size: 18px;
    color: #00ffd5;
    font-weight: bold;
    box-shadow: 0 0 15px rgba(0,255,213,0.6);
}

.quiz-box {
    max-width: 760px;
    margin: 40px auto;
    background: rgba(10, 20, 30, 0.92);
    padding: 30px;
    border-radius: 18px;
    border: 1px solid rgba(0,255,213,0.3);
    box-shadow: 0 0 30px rgba(0,255,213,0.35);
}

.question {
    display: none;
}
.question.active {
    display: block;
}

.question p {
    font-size: 18px;
    margin-bottom: 12px;
    font-weight: bold;
}

label {
    display: block;
    padding: 10px 14px;
    margin: 10px 0;
    background: #020617;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid #334155;
    transition: all 0.3s ease;
}

label:hover {
    background: #0f172a;
    border-color: #00ffd5;
    box-shadow: 0 0 12px rgba(0,255,213,0.4);
}

input[type="radio"] {
    accent-color: #00ffd5;
    margin-right: 10px;
}

.buttons {
    text-align: center;
    margin-top: 30px;
}

button {
    padding: 12px 26px;
    font-size: 15px;
    border-radius: 30px;
    cursor: pointer;
    margin: 0 8px;
    border: none;
    font-weight: bold;
    transition: 0.3s ease;
}

.prev {
    background: linear-gradient(135deg,#6366f1,#4338ca);
    color: white;
}

.next {
    background: linear-gradient(135deg,#22c55e,#15803d);
    color: white;
}

.submit {
    background: linear-gradient(135deg,#f59e0b,#b45309);
    color: #1f2937;
}

button:hover {
    transform: translateY(-4px);
    box-shadow: 0 0 18px rgba(0,255,213,0.6);
}
</style>

</head>

<body>

<div class="header-bar">
    <h1>Junior MCQ Quiz</h1>
    <div id="timer">Time: <span id="time">10:00</span></div>
</div>

<div class="quiz-box">
<form id="quizForm">

<div class="question active">
<p>1. What is Artificial Intelligence?</p>
<label><input type="radio" name="q1" value="a"> Simulation of human intelligence by machines</label>
<label><input type="radio" name="q1" value="b"> A type of robot only</label>
<label><input type="radio" name="q1" value="c"> Only used in video games</label>
<label><input type="radio" name="q1" value="d"> A programming language</label>
</div>

<div class="question">
<p>2. Which is a common AI application?</p>
<label><input type="radio" name="q2" value="a"> Chatbots</label>
<label><input type="radio" name="q2" value="b"> Self-driving cars</label>
<label><input type="radio" name="q2" value="c"> Image recognition</label>
<label><input type="radio" name="q2" value="d"> All of the above</label>
</div>

<div class="question">
<p>3. What does ML stand for?</p>
<label><input type="radio" name="q3" value="a"> Machine Learning</label>
<label><input type="radio" name="q3" value="b"> Modern Language</label>
<label><input type="radio" name="q3" value="c"> Machine Logic</label>
<label><input type="radio" name="q3" value="d"> Mobile Linking</label>
</div>

<div class="question">
<p>4. Which algorithm is used for classification?</p>
<label><input type="radio" name="q4" value="a"> Linear Regression</label>
<label><input type="radio" name="q4" value="b"> Decision Tree</label>
<label><input type="radio" name="q4" value="c"> K-means</label>
<label><input type="radio" name="q4" value="d"> Principal Component Analysis</label>
</div>

<div class="question">
<p>5. What is Deep Learning?</p>
<label><input type="radio" name="q5" value="a"> A subset of Machine Learning</label>
<label><input type="radio" name="q5" value="b"> Learning while sleeping</label>
<label><input type="radio" name="q5" value="c"> Understanding complex data</label>
<label><input type="radio" name="q5" value="d"> Both A and C</label>
</div>

<div class="buttons">
    <button type="button" class="prev" onclick="prevQuestion()">← Previous</button>
    <button type="button" class="next" onclick="nextQuestion()">Next →</button>
    <button type="submit" class="submit" onclick="submitQuiz(event)">Submit Quiz</button>
</div>

</form>
</div>

<script>
let currentQuestion = 0;
const questions = document.querySelectorAll(".question");
const totalQuestions = questions.length;
let timeLeft = 600;

function showQuestion(n) {
    questions[currentQuestion].classList.remove("active");
    currentQuestion = (n + totalQuestions) % totalQuestions;
    questions[currentQuestion].classList.add("active");
}

function nextQuestion() {
    showQuestion(currentQuestion + 1);
}

function prevQuestion() {
    showQuestion(currentQuestion - 1);
}

function submitQuiz(e) {
    e.preventDefault();
    alert("Quiz submitted!");
    window.history.back();
}

// Timer
setInterval(() => {
    if (timeLeft > 0) {
        timeLeft--;
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        document.getElementById("time").textContent = 
            mins + ":" + (secs < 10 ? "0" : "") + secs;
    }
}, 1000);
</script>

</body>
</html>
