<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Final Coding Round</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", sans-serif;
}
body{
    min-height:100vh;
    background:
      linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
      url("https://images.unsplash.com/photo-1555066931-4365d14bab8c");
    background-size:cover;
    background-position:center;
    color:#e0fefe;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
}
.header{
    width:90%;
    max-width:900px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}
.header h1{
    font-size:32px;
    color:#2fffdc;
}
.timer{
    font-size:18px;
    font-weight:bold;
    color:#ffd700;
}
.container{
    width:90%;
    max-width:900px;
    background:rgba(10,20,25,0.95);
    padding:30px;
    border-radius:16px;
    box-shadow:0 0 25px rgba(0,255,200,0.3);
}
h2{
    text-align:center;
    margin-bottom:10px;
}
.question{
    font-size:16px;
    margin:20px 0;
    line-height:1.6;
}
textarea{
    width:100%;
    height:220px;
    background:#111;
    color:#e0fefe;
    border:none;
    border-radius:10px;
    padding:12px;
    font-family:Consolas, monospace;
    resize:none;
    border-left:4px solid #00ffd5;
}
.buttons{
    text-align:center;
    margin-top:25px;
}
button{
    background:linear-gradient(135deg,#00ffd5,#00bfa6);
    color:#002222;
    border:none;
    padding:12px 28px;
    margin:5px;
    border-radius:25px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}
button:hover{
    transform:translateY(-3px);
    box-shadow:0 0 20px rgba(0,255,200,0.7);
}
</style>
</head>

<body>

<div class="header">
    <h1>Final Coding Round</h1>
    <div class="timer">⏱ Time: <span id="time">40:00</span></div>
</div>

<div class="container">
    <h2 id="qno"></h2>
    <div class="question" id="questionText"></div>
    <textarea id="answer" placeholder="Write your C program here..."></textarea>

    <div class="buttons">
        <button onclick="prevQ()">Previous</button>
        <button onclick="nextQ()">Next</button>
        <button onclick="submitRound()">Submit Round</button>
    </div>
</div>

<script>
/* QUESTIONS */
const questions = [
  "Write a C program to read a number and print whether it is Positive, Negative, or Zero.",
  "Write a C program to print all even numbers from 1 to N.",
  "Write a C program to find the sum of digits of a given number.",
  "Write a C program to check whether a given number is a Palindrome.",
  "Write a C program to find the factorial of a number using a function."
];

/* KEYWORDS (AUTO CHECK) */
const keywords = [
  ["if","else","printf"],
  ["for","%","printf"],
  ["while","%","/"],
  ["while","if","reverse"],
  ["return","*","function"]
];

let index = 0;
let answers = new Array(questions.length).fill("");

function loadQ(){
  document.getElementById("qno").innerText = "Question " + (index+1);
  document.getElementById("questionText").innerText = questions[index];
  document.getElementById("answer").value = answers[index];
}

function nextQ(){
  answers[index] = answer.value;
  if(index < questions.length-1){ index++; loadQ(); }
}

function prevQ(){
  answers[index] = answer.value;
  if(index > 0){ index--; loadQ(); }
}

/* AUTO CORRECTION */
function autoCorrect(){
  let score = 0;
  answers.forEach((ans,i)=>{
    let match = keywords[i].filter(k=>ans.includes(k)).length;
    if(match >= 2) score += 2;
  });
  return score;
}

/* SUBMIT */
function submitRound(){
  answers[index] = answer.value;
  const score = autoCorrect();

  const participant = JSON.parse(localStorage.getItem("participant"));
  let all = JSON.parse(localStorage.getItem("allParticipants")) || [];

  const idx = all.findIndex(p => p.roll === participant.roll);

  const roundData = {
    questions,
    answers,
    score
  };

  if(idx === -1){
    participant.round3 = roundData;
    all.push(participant);
  }else{
    all[idx].round3 = roundData;
  }

  localStorage.setItem("allParticipants", JSON.stringify(all));

  alert("Final Round Submitted!\nScore: "+score+"/10");

  window.location.href = "competition-home.html";
}

loadQ();
</script>

</body>
</html>
