<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Competition Portal</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:"Segoe UI",sans-serif;
  color:#e5e7eb;
  background:
    linear-gradient(rgba(2,6,23,0.92),rgba(2,6,23,0.92)),
    url("https://images.unsplash.com/photo-1550751827-4bd374c3f58b");
  background-size:cover;
  background-position:center;
}

.card{
  width:420px;
  padding:35px;
  border-radius:16px;
  background:#020617;
  box-shadow:
    0 0 30px rgba(0,255,204,0.15),
    inset 0 0 20px rgba(0,255,204,0.05);
  border:1px solid #1f2937;
}

h1{
  font-size:20px;
  text-align:center;
  margin-bottom:5px;
  color:#00ffcc;
}
h2{
  font-size:15px;
  text-align:center;
  margin-bottom:15px;
  color:#9ca3af;
}
h3{
  text-align:center;
  margin:20px 0;
  letter-spacing:2px;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#020617;
  border:1px solid #1f2937;
  border-radius:8px;
  color:#e5e7eb;
}
input:focus,select:focus{
  outline:none;
  border-color:#00ffcc;
}

button{
  margin-top:25px;
  width:100%;
  padding:12px;
  background:linear-gradient(135deg,#00ffcc,#00c4a7);
  border:none;
  border-radius:10px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  color:#020617;
}
button:hover{opacity:0.9}

.footer{
  margin-top:20px;
  text-align:center;
  font-size:12px;
  color:#6b7280;
}
</style>
</head>

<body>

<div class="card">
  <h1>Geethanjali Institute of Science and Technology</h1>
  <h2>Artificial Intelligence & Data Science</h2>

  <h3>COMPETITION</h3>

  <!-- IMPORTANT: added IDs -->
  <input type="text" id="name" placeholder="Participant Name">
  <input type="text" id="roll" placeholder="Roll Number">

  <select id="year">
    <option value="">Select Year</option>
    <option value="1">1st Year </option>
    <option value="2">2nd Year </option>
  </select>

  <button onclick="go()">Proceed</button>

  <div class="footer">Powered by AI & DS Club</div>
</div>

<script>
function go(){
  const name = document.getElementById("name").value.trim();
  const roll = document.getElementById("roll").value.trim();
  const year = document.getElementById("year").value;

  if(name === "" || roll === "" || year === ""){
    alert("Please fill all details");
    return;
  }

  // ✅ SAVE participant data (VERY IMPORTANT)
  localStorage.setItem("participant", JSON.stringify({
    name: name,
    roll: roll,
    year: year,
    round1: 0,
    round2: 0,
    round3: 0
  }));

  // ✅ REDIRECT
  if(year === "1"){
    location.href = "junior/j-competition-home.html";
  }else{
    location.href = "senior/s-competition-home.html";
  }
}
</script>

</body>
</html>
