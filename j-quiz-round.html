<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Junior Quiz Competition</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">       

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0a0f14;
  font-family:'Orbitron',sans-serif;
  color:#00ffcc;
}

.container{
  width:420px;
  background:#101820;
  border-radius:18px;
  padding:40px;
  box-shadow:0 0 25px rgba(0,255,204,0.25);
  text-align:center;
}

h1{
  font-size:24px;
  margin-bottom:10px;
  text-shadow:0 0 8px #00ffcc;
}

h2{
  font-size:15px;
  color:#66ffe0;
  margin-bottom:30px;
}

.round{
  background:#0d1620;
  border:1px solid #00ffcc;
  border-radius:12px;
  padding:18px;
  margin-bottom:18px;
  cursor:pointer;
  transition:0.3s;
}

.round:hover{
  box-shadow:0 0 15px #00ffcc;
  transform:scale(1.03);
}

.round h3{
  font-size:16px;
  margin-bottom:6px;
}

.round p{
  font-size:13px;
  color:#88ffe8;
}

.back-btn {
  margin-top: 20px;
}

.back-btn a {
  color: #66ffe0;
  text-decoration: none;
  font-size: 12px;
}

.back-btn a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">
  <h1>Quiz Competition</h1>
  <h2>Junior Category (1st Year)</h2>

  <div class="round" onclick="openRound('JRQ1@AI','./j-quiz-mcq.html')">
    <h3>Sub Round 1: MCQ Quiz</h3>
    <p>General knowledge & aptitude questions</p>
  </div>

  <div class="round" onclick="openRound('JRQ2@AI','./j-quiz-puzzle.html')">
    <h3>Sub Round 2: Logic Puzzles</h3>
    <p>Solve tricky logical puzzles</p>
  </div>

  <div class="round" onclick="openRound('JRQ3@AI','./j-quiz-rapidfire.html')">
    <h3>Sub Round 3: Rapid Fire</h3>
    <p>Fast-paced quick answer rounds</p>
  </div>

  <div class="back-btn">
    <a href="./j-competition-home.html">← Back to Home</a>
  </div>
</div>

<script>
function openRound(correctPassword, page){
  const entered = prompt("Enter Round Password:");

  if(entered === null) return;

  if(entered === correctPassword){
    window.location.href = page;
  }else{
    alert("❌ Wrong Password!");
  }
}
</script>

</body>
</html>
