<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Junior Coding Competition</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0a0f14;
  font-family:'Orbitron',sans-serif;
  color:#00ffcc;
}

.container{
  width:420px;
  background:#101820;
  border-radius:18px;
  padding:40px;
  box-shadow:0 0 25px rgba(0,255,204,0.25);
  text-align:center;
}

h1{
  font-size:24px;
  margin-bottom:10px;
  text-shadow:0 0 8px #00ffcc;
}

h2{
  font-size:15px;
  color:#66ffe0;
  margin-bottom:30px;
}

.round{
  background:#0d1620;
  border:1px solid #00ffcc;
  border-radius:12px;
  padding:18px;
  margin-bottom:18px;
  cursor:pointer;
  transition:0.3s;
}

.round:hover{
  box-shadow:0 0 15px #00ffcc;
  transform:scale(1.03);
}

.round h3{
  font-size:16px;
  margin-bottom:6px;
}

.round p{
  font-size:13px;
  color:#88ffe8;
}
</style>
</head>

<body>

<div class="container">
  <h1>Coding Competition</h1>

  <div class="round" onclick="openRound('JR1@AI','./j-coding-mcq.html')">
    <h3>Sub Round 1: Online MCQs</h3>
    <p>C programming fundamentals & logic questions</p>
  </div>

  <div class="round" onclick="openRound('JR2@AI','./j-coding-error-detection.html')">
    <h3>Sub Round 2: Error Detection</h3>
    <p>Find and correct errors in C programs</p>
  </div>

  <div class="round" onclick="openRound('JR3@AI','./j-coding-program-writing.html')">
    <h3>Sub Round 3: Final Coding Challenge</h3>
    <p>Advanced logic-based C coding</p>
  </div>
</div>

<script>
function openRound(correctPassword, page){
  const entered = prompt("Enter Round Password:");

  if(entered === null) return;

  if(entered === correctPassword){
    window.location.href = page;
  }else{
    alert("❌ Wrong Password!");
  }
}
</script>

</body>
</html>
